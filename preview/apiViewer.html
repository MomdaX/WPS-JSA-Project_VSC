<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WPS API 文档查看器</title>
  <link rel="stylesheet" href="prism/prism.css">
  <link rel="stylesheet" href="lib/flipclock.css">
  <script src="prism/prism.js"></script>
  <script src="lib/lodash.min.js"></script>
  <script src="lib/filldata.js"></script>
  <script src="lib/theme.js"></script>
  <script src="lib/flipclock.js"></script>
  <style>
    /* ===== CSS 变量：科技蓝主题（默认） ===== */
    :root {
      --bg-body: #060b1a;
      --bg-wallpaper: none;
      --bg-content: rgba(10, 20, 50, 0.55);
      --bg-sidebar: rgba(10, 20, 50, 0.7);
      --bg-sidebar-hover: rgba(0, 180, 255, 0.1);
      --bg-sidebar-active: rgba(0, 180, 255, 0.15);
      --bg-group-title: rgba(255,255,255,0.03);
      --bg-footer: rgba(255,255,255,0.03);
      --bg-detail-item: rgba(10, 36, 60, 0.6);
      --bg-detail-hover: rgba(0, 180, 255, 0.08);
      --bg-search: rgba(255,255,255,0.06);
      --bg-signature: rgba(0, 180, 255, 0.08);
      --bg-th: rgba(255,255,255,0.05);
      --bg-tr-hover: rgba(255,255,255,0.03);
      --bg-copy: rgba(0, 180, 255, 0.12);
      --bg-float-btn: rgba(10, 20, 50, 0.8);
      --bg-highlight: rgba(0, 212, 255, 0.2);

      --text-body: #c8d6e5;
      --text-secondary: #7a8ba0;
      --text-muted: #5a6a80;
      --text-heading: #e0e8f0;
      --text-nav: #a0b0c0;
      --text-th: #c8d6e5;
      --text-detail-title: #d0d8e5;
      --text-placeholder: #4a5a70;

      --border-color: rgba(0, 180, 255, 0.12);
      --border-light: rgba(0, 180, 255, 0.08);
      --border-divider: rgba(0, 180, 255, 0.1);

      --color-primary: #00b4d8;
      --color-primary-dark: #0077b6;
      --color-primary-light: rgba(0, 180, 216, 0.15);
      --color-primary-bg: rgba(0, 180, 216, 0.1);
      --color-error: #ff6b6b;

      --shadow-sidebar: 0 0 30px rgba(0, 180, 255, 0.08);
      --shadow-table: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-float: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-expanded: 0 0 20px rgba(0, 180, 255, 0.1);

      --bg-pre: #0d1117;
      --text-pre: #c9d1d9;
    }

    /* ===== 代码块深色主题（hljs 原生类名） ===== */
    pre {
      background: var(--bg-pre) !important;
      color: var(--text-pre);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
      margin: 12px 0;
    }
    pre code {
      font-family: "Consolas", "Courier New", monospace;
      color: var(--text-pre);
    }
    code { font-family: "Consolas", "Courier New", monospace; font-size: 13px; }
    .hljs-comment { color: #6a9955 !important; font-style: italic; }
    .hljs-keyword, .hljs-literal, .hljs-meta { color: #569cd6 !important; }
    .hljs-string { color: #ce9178 !important; }
    .hljs-number { color: #b5cea8 !important; }
    .hljs-built_in, .hljs-title.class_, .hljs-type { color: #4ec9b0 !important; }
    .hljs-title.function_, .hljs-selector-class { color: #dcdcaa !important; }
    .hljs-params, .hljs-property, .hljs-attr, .hljs-variable { color: #9cdcfe !important; }
    .hljs-operator { color: #d4d4d4 !important; }

    /* ===== 全局样式重置 ===== */
    * { box-sizing: border-box; margin: 0;}
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: var(--text-body);
      background-color: #060b1a;
      background-image: var(--bg-wallpaper);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      line-height: 1.7;
      display: flex;
      flex-direction: row;
      transition: background .3s, color .3s;
      position: relative;
    }
    /* 科技网格背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 180, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }
    /* 径向光晕 */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      right: -20%;
      width: 80%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0, 150, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== 左侧边栏导航 ===== */
    #sidebar {
      width: 300px;
      background: rgba(8, 16, 40, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 180, 255, 0.12);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sidebar);
      transition: background .3s, border-color .3s;
    }
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border-color);
      background: linear-gradient(135deg, #0a4da4 0%, #023e8a 50%, #03045e 100%);
      color: #fff;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sidebar-header p {
      font-size: 12px;
      opacity: 0.8;
    }
    /* 主题切换按钮 */
    .theme-toggle {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      background: rgba(255,255,255,0.35);
    }

    /* 搜索框 */
    .search-box {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      background: transparent;
      transition: background .3s, border-color .3s;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(0, 180, 255, 0.2);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s, background .3s, color .3s;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-body);
    }
    .search-box input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
      background: rgba(255, 255, 255, 0.08);
    }
    .search-box input::placeholder { color: var(--text-placeholder); }

    /* 对象列表 */
    .nav-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    /* 导航滚动条 */
    .nav-container::-webkit-scrollbar { width: 4px; }
    .nav-container::-webkit-scrollbar-thumb {
      background: rgba(0, 180, 255, 0.15);
      border-radius: 2px;
    }
    .nav-group {
      margin-bottom: 8px;
    }
    .nav-group-title {
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-group-title);
      letter-spacing: 1px;
      transition: background .3s, color .3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .nav-group-toggle {
      border: none;
      background: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: color .2s, transform .2s;
    }
    .nav-group-toggle:hover {
      color: var(--color-primary);
    }
    .nav-group.collapsed .nav-item { display: none; }
    .nav-group.collapsed .nav-group-toggle { transform: rotate(-90deg); }
    .nav-item {
      display: block;
      padding: 6px 20px 6px 28px;
      color: var(--text-nav);
      text-decoration: none;
      font-size: 13px;
      transition: all .2s;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background: var(--bg-sidebar-hover);
      color: var(--color-primary);
      border-left-color: var(--color-primary);
    }
    .nav-item.active {
      background: var(--bg-sidebar-active);
      color: var(--color-primary);
      border-left-color: var(--color-primary);
      font-weight: 600;
    }
    .nav-item.hidden { display: none; }

    /* 统计信息 */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-footer);
      transition: background .3s, border-color .3s, color .3s;
    }
    .stat-item { display: flex; justify-content: space-between; margin: 2px 0; }

    /* ===== 主内容区 ===== */
    #mainContent {
      flex: 1;
      margin-left: 300px;
      height: 100vh;
      overflow-y: auto;
      background: rgba(6, 12, 30, 0.6);/* 半透明深色背景 */
      backdrop-filter: blur(8px);/* 毛玻璃模糊（标准） */
      -webkit-backdrop-filter: blur(8px);/* 毛玻璃模糊（webkit） */
      transition: background .3s;/* 背景颜色过渡 */
      position: relative;/* 相对定位 */
      z-index: 1;
    }
    /* 主内容区滚动条 */
    #mainContent::-webkit-scrollbar { width: 6px; }
    #mainContent::-webkit-scrollbar-thumb {
      background: rgba(0, 180, 255, 0.12);
      border-radius: 3px;
    }
    /* 滚动条通用：轨道透明 + hover 加深 */
    .nav-container::-webkit-scrollbar-track,
    #mainContent::-webkit-scrollbar-track { background: transparent; }
    .nav-container::-webkit-scrollbar-thumb:hover,
    #mainContent::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 180, 255, 0.3);
    }
    .content-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    /* 页面头部 */
    #header { margin-bottom: 26px; }
    #template_header { font-size: 26px; }
    #topTable { width: 100%; }
    #headerTableRow2 {
      background: linear-gradient(135deg, rgba(0, 180, 216, 0.36) 0%, rgba(185, 75, 28, 0.36) 100%);
      border-left: 6px solid var(--color-primary);
      border-radius: 8px;
    }

    /* 导航屑 */
    .cdclvBreadcrumbs {
      padding: 8px 0;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-divider);
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* 说明区 */
    #template_description { margin-bottom: 12px; }
    #template_summary { margin-bottom: 20px; }
    #template_summary > p:first-child { margin-bottom: 8px; }

    h4 { font-size: 16px; margin: 0; }
    b { font-weight: 600; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0 16px;
      font-size: 13px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-table);
    }
    th, td {
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      text-align: left;
      vertical-align: middle;
      transition: border-color .3s;
    }
    th {
      background: var(--bg-th);
      font-weight: 600;
      color: var(--text-th);
      transition: background .3s, color .3s;
    }
    tr:hover { background: var(--bg-tr-hover); }

    /* 成员列表表格 */
    .icon-cell { width: 48px; text-align: center; font-size: 12px; color: var(--text-secondary); }
    .icon-cell img { width: 32px; height: 32px; vertical-align: middle; }
    .name-cell { width: 140px; }
    .desc-cell { word-break: break-all; }

    /* 成员列表容器毛玻璃效果 */
    #vstable {
      background: rgba(66, 66, 88, 0.66);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid #ccc2c2;
      border-radius: 12px;
      box-shadow: 0 1px 12px rgba(0,0.3,0.01);
      margin-bottom: 12px;
    }

    /* 详情区 */
    #template_details { margin-top: 30px; }
    .detail-item {
      margin-bottom: 8px;
      background: var(--bg-detail-item);
      border-radius: 6px;
      border: 1px solid var(--border-light);
      overflow: hidden;
      transition: border-color .2s, background .3s;
    }
    .detail-item.expanded {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-expanded);
    }
    .detail-title {
      padding: 12px 16px;
      margin: 0;
      font-size: 15px;
      color: var(--text-detail-title);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .2s, color .2s;
    }
    .detail-title:hover {
      background: var(--bg-detail-hover);
      color: var(--color-primary);
    }
    .detail-title .toggle-icon {
      font-size: 12px;
      color: var(--text-muted);
      transition: transform .2s;
    }
    .detail-item.expanded .detail-title .toggle-icon {
      transform: rotate(90deg);
      color: var(--color-primary);
    }
    .detail-body {
      display: none;
      padding: 0 16px 16px;
    }
    .detail-item.expanded .detail-body {
      display: block;
    }
    .detail-body p { margin-bottom: 8px; }
    .signature {
      background: var(--bg-signature);
      padding: 10px 14px;
      border-left: 4px solid var(--color-primary);
      margin: 12px 0;
      font-family: "Consolas", "Courier New", monospace;
      border-radius: 0 4px 4px 0;
      transition: background .3s;
    }
    .mainheaders { font-size: 15px; color: var(--text-heading); transition: color .3s; }

    /* 浮动按钮 */
    #floatCommit {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-left: 300px;
    }
    .floatButton {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-float-btn);
      color: var(--text-body);
      cursor: pointer;
      font-size: 14px;
      box-shadow: var(--shadow-float);
      transition: all .2s;
    }
    .floatButton:hover {
      background: var(--color-primary);
      color: #fff;
      transform: scale(1.05);
    }

    /* 时钟区域微光 */
    .clock-box {
      position: relative;
    }
    .clock-box::after {
      content: '';
      position: absolute;
      inset: -8px -4px;
      border-radius: 10px;
      background: radial-gradient(ellipse at center, rgba(0, 180, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* 复制按钮 */
    .copy {
      float: right;
      cursor: pointer;
      color: var(--color-primary);
      font-size: 12px;
      user-select: none;
      background: var(--bg-copy);
      padding: 2px 8px;
      border-radius: 4px;
      transition: all .2s;
    }
    .copy:hover {
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
    }

    /* 加载/错误提示 */
    #loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: 16px; }
    #error { color: var(--color-error); text-align: center; padding: 40px; display: none; }
    #error a { color: var(--color-error); text-decoration: underline; }

    /* 平台信息 */
    .footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border-divider); color: var(--text-muted); font-size: 12px; transition: border-color .3s, color .3s; }

    /* 响应式 */
    @media (max-width: 1200px) {
      #sidebar { width: 260px; }
      #mainContent { margin-left: 260px; }
      #floatCommit { margin-left: 260px; }
    }

    /* 高亮搜索结果 */
    .search-highlight {
      background: var(--bg-highlight);
      padding: 1px 2px;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <!-- ===== 左侧导航栏 ===== -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div>
        <h1>📘 WPS API 文档</h1>
        <p>223 个表格对象参考</p>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
    </div>
    <div class="clock-box">
      <div class="FlipClock" id="flipClock"></div>
    </div>
    <div class="search-box">
      <input type="text" id="navSearch" placeholder="🔍 搜索对象名称..." oninput="filterNav()">
    </div>
    <div class="nav-container" id="navContainer">
      <div class="nav-group collapsed" id="navGroupA"></div>
      <div class="nav-group collapsed" id="navGroupB"></div>
      <div class="nav-group collapsed" id="navGroupC"></div>
      <div class="nav-group collapsed" id="navGroupD"></div>
      <div class="nav-group collapsed" id="navGroupE"></div>
      <div class="nav-group collapsed" id="navGroupF"></div>
      <div class="nav-group collapsed" id="navGroupG"></div>
      <div class="nav-group collapsed" id="navGroupH"></div>
      <div class="nav-group collapsed" id="navGroupI"></div>
      <div class="nav-group collapsed" id="navGroupL"></div>
      <div class="nav-group collapsed" id="navGroupM"></div>
      <div class="nav-group collapsed" id="navGroupN"></div>
      <div class="nav-group collapsed" id="navGroupO"></div>
      <div class="nav-group collapsed" id="navGroupP"></div>
      <div class="nav-group collapsed" id="navGroupQ"></div>
      <div class="nav-group collapsed" id="navGroupR"></div>
      <div class="nav-group collapsed" id="navGroupS"></div>
      <div class="nav-group collapsed" id="navGroupT"></div>
      <div class="nav-group collapsed" id="navGroupU"></div>
      <div class="nav-group collapsed" id="navGroupV"></div>
      <div class="nav-group collapsed" id="navGroupW"></div>
      <div class="nav-group collapsed" id="navGroupX"></div>
    </div>
    <div class="sidebar-footer">
      <div class="stat-item"><span>📦 对象总数</span><span id="totalCount">0</span></div>
      <div class="stat-item"><span>📋 方法总数</span><span id="funcCount">0</span></div>
      <div class="stat-item"><span>🏷️ 属性总数</span><span id="propCount">0</span></div>
    </div>
  </div>

  <!-- ===== 主内容区 ===== -->
  <div id="mainContent">
    <div class="content-inner">
      <!-- 加载中 -->
      <div id="loading">⏳ 正在加载 API 文档...</div>
      <div id="error"></div>

      <!-- 页面内容（初始隐藏） -->
      <div id="pageContent" style="display:none;">
        <div class="cdclvBreadcrumbs cdbread">
          <span id="template_bread"></span>
        </div>
        <div class="cdclvSection">
          <div class="devdocvsbody">
            <div id="header">
              <table id="topTable">
                <tr id="headerTableRow2">
                  <td align="left">
                    <span id="nsrTitle">
                      <b class="mainheaders" id="template_header">对象</b>
                    </span>
                  </td>
                </tr>
              </table>
            </div>
            <div id="template_content">
              <div id="template_description"></div>
              <div id="template_summary">
                <p><b class="mainheaders">说明</b></p>
              </div>
              <div id="template_members">
                <div id="member_functions">
                  <p><b class="mainheaders">方法</b></p>
                  <div id="vstable">
                    <table>
                      <thead>
                        <tr style="text-align:left;">
                          <th class="icon-cell"></th>
                          <th class="name-cell">名称</th>
                          <th>说明</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>
                <div id="member_properties">
                  <p><b class="mainheaders">属性</b></p>
                  <div id="vstable">
                    <table>
                      <thead>
                        <tr style="text-align:left;">
                          <th class="icon-cell"></th>
                          <th class="name-cell">名称</th>
                          <th>说明</th>
                        </tr>
                      </thead>
                      <tbody></tbody>
                    </table>
                  </div>
                </div>
              </div>
              <div id="template_details">
                <div id="functions_details">
                  <p><b class="mainheaders">成员方法</b></p>
                  <div id="funcs_details_content"></div>
                </div>
                <div id="properties_details">
                  <p><b class="mainheaders">成员属性</b></p>
                  <div id="props_details_content"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="footer">
            <div>适用环境：web</div>
            <div id="template_platform">适用平台：windows/linux</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 浮动按钮 -->
  <div id="floatCommit" style="display:none;">
    <button class="floatButton" onclick="backToTop()" title="回到顶部">▲</button>
    <button class="floatButton" onclick="backToMember()" title="返回列表">▼</button>
  </div>

  <script>
    // ========== 所有 WPS 表格 API 对象列表（按字母分组） ==========
    var ALL_OBJECTS = [
      'AboveAverage', 'AddIn', 'AddIns', 'AddIns2', 'Adjustments', 'AllowEditRange', 'AllowEditRanges', 'Application', 'Areas', 'AutoFilter', 'AutoRecover', 'Axes', 'Axis', 'AxisTitle',
      'Border', 'Borders',
      'CalculatedFields', 'CalculatedItems', 'CategoryCollection', 'CellFormat', 'Characters', 'Chart', 'ChartArea', 'ChartCategory', 'ChartFormat', 'ChartGroup', 'ChartGroups', 'ChartObject', 'ChartObjects', 'ChartTitle', 'Charts', 'ColorFormat', 'ColorScale', 'ColorScaleCriteria', 'ColorScaleCriterion', 'ColorStop', 'ColorStops', 'Comment', 'Comments', 'ConditionValue', 'Connections', 'ConnectorFormat', 'ControlFormat', 'CustomProperties', 'CustomProperty', 'CustomView', 'CustomViews',
      'DataBarBorder', 'DataLabel', 'DataLabels', 'DataTable', 'Databar', 'DefaultWebOptions', 'Dialog', 'Dialogs', 'DisplayFormat', 'DisplayUnitLabel', 'DownBars', 'DropLines',
      'Error', 'ErrorBars', 'ErrorCheckingOptions', 'Errors',
      'FillFormat', 'Filter', 'Filters', 'Font', 'FormatColor', 'FormatCondition', 'FormatConditions', 'FreeformBuilder', 'FullSeriesCollection',
      'Graphic', 'Gridlines', 'GroupShapes',
      'HPageBreak', 'HPageBreaks', 'HeaderFooter', 'HiLoLines', 'Hyperlink', 'Hyperlinks',
      'Icon', 'IconCriteria', 'IconCriterion', 'IconSet', 'IconSetCondition', 'IconSets', 'Interior',
      'LeaderLines', 'Legend', 'LegendEntries', 'LegendEntry', 'LegendKey', 'LineFormat', 'LinearGradient', 'ListColumn', 'ListColumns', 'ListObject', 'ListObjects', 'ListRow', 'ListRows',
      'MultiThreadedCalculation',
      'Name', 'Names', 'NegativeBarFormat',
      'ODBCConnection', 'ODBCErrors', 'OLEDBConnection', 'OLEDBError', 'OLEDBErrors', 'OLEFormat', 'OLEObject', 'OLEObjects', 'Outline',
      'Page', 'PageSetup', 'Pages', 'Pane', 'Panes', 'PictureFormat', 'PivotAxis', 'PivotCache', 'PivotCaches', 'PivotCell', 'PivotField', 'PivotFields', 'PivotFilter', 'PivotFilters', 'PivotFormula', 'PivotFormulas', 'PivotItem', 'PivotItemList', 'PivotItems', 'PivotLayout', 'PivotLine', 'PivotLineCells', 'PivotLines', 'PivotTable', 'PivotTables', 'PlotArea', 'Point', 'Points', 'Protection', 'PublishObject', 'PublishObjects',
      'QueryTable', 'QueryTables',
      'RTD', 'Range', 'Ranges', 'RecentFile', 'RecentFiles', 'RectangularGradient',
      'Series', 'SeriesCollection', 'SeriesLines', 'ShadowFormat', 'Shape', 'ShapeNodes', 'ShapeRange', 'Shapes', 'SheetViews', 'Sheets', 'Slicer', 'SlicerCache', 'SlicerCaches', 'SlicerItem', 'SlicerItems', 'SlicerPivotTables', 'Slicers', 'Sort', 'SortField', 'SortFields', 'SparkAxes', 'SparkColor', 'SparkHorizontalAxis', 'SparkPoints', 'Sparkline', 'SparklineGroup', 'SparklineGroups', 'Speech', 'SpellingOptions', 'Style', 'Styles',
      'Tab', 'TableStyle', 'TableStyleElement', 'TableStyleElements', 'TableStyles', 'TextConnection', 'TextEffectFormat', 'TextFrame', 'TextFrame2', 'ThreeDFormat', 'TickLabels', 'Top10', 'Trendline', 'Trendlines',
      'UniqueValues', 'UpBars',
      'VPageBreak', 'VPageBreaks', 'Validation',
      'Watch', 'Watches', 'WebOptions', 'Window', 'Windows', 'Workbook', 'WorkbookConnection', 'Workbooks', 'Worksheet', 'WorksheetFunction', 'WorksheetView', 'Worksheets',
      'XPath', 'XmlDataBinding', 'XmlMap', 'XmlMaps', 'XmlNamespace', 'XmlNamespaces', 'XmlSchema', 'XmlSchemas'
    ];

    // 需要分组的字母
    var GROUP_LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'L', 'M', 'N', 'O', 'P', 'Q', 'R', 'S', 'T', 'U', 'V', 'W', 'X'];

    var currentObjName = '';
    var previousObjName = '';

    // ========== 构建左侧导航栏 ==========
    function buildNav() {
      var grouped = _.groupBy(ALL_OBJECTS, function(name) {
        return name.charAt(0).toUpperCase();
      });

      _.forEach(GROUP_LETTERS, function(letter) {
        var groupEl = document.getElementById('navGroup' + letter);
        if (!groupEl) return;

        var items = grouped[letter] || [];
        if (_.isEmpty(items)) {
          groupEl.style.display = 'none';
          return;
        }

        groupEl.innerHTML = '<div class="nav-group-title" onclick="toggleNavGroup(this)">' + letter +
          '<button class="nav-group-toggle" onclick="event.stopPropagation();toggleNavGroup(this.parentElement);">▼</button></div>';

        _.forEach(items, function(objName) {
          var a = document.createElement('a');
          a.className = 'nav-item';
          a.textContent = objName;
          a.href = '?obj=' + objName;
          a.setAttribute('data-obj', objName);
          a.onclick = function(e) {
            e.preventDefault();
            navigateToObject(this.getAttribute('data-obj'));
          };
          groupEl.appendChild(a);
        });
      });
    }

    // ========== 导航到指定对象 ==========
    function navigateToObject(objName) {
      if (objName === currentObjName) return;

      history.pushState(null, '', '?obj=' + objName);

      _.forEach(document.querySelectorAll('.nav-item'), function(item) {
        item.classList.remove('active');
      });

      var activeItem = document.querySelector('[data-obj="' + objName + '"]');
      if (activeItem) {
        activeItem.classList.add('active');
        activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }

      currentObjName = objName;
      loadAndRender(objName);
    }

    // ========== 折叠/展开导航分组 ==========
    function toggleNavGroup(titleEl) {
      var group = titleEl.parentElement;
      var isOpen = !group.classList.contains('collapsed');
      _.forEach(document.querySelectorAll('.nav-group'), function(g) { g.classList.add('collapsed'); });
      if (!isOpen) group.classList.remove('collapsed');
    }

    // ========== 搜索过滤 ==========
    function filterNav() {
      var keyword = _.trim(_.toLower(document.getElementById('navSearch').value));

      _.forEach(document.querySelectorAll('.nav-item'), function(item) {
        var name = _.toLower(item.getAttribute('data-obj'));
        item.classList.toggle('hidden', keyword !== '' && !_.includes(name, keyword));
      });

      _.forEach(document.querySelectorAll('.nav-group'), function(group) {
        var visibleItems = group.querySelectorAll('.nav-item:not(.hidden)');
        group.style.display = visibleItems.length === 0 ? 'none' : '';
      });
    }

    // ========== 更新统计信息 ==========
    function updateStats(jsData) {
      document.getElementById('totalCount').textContent = '223';
      document.getElementById('funcCount').textContent = _.get(jsData, 'functions.length', 0);
      document.getElementById('propCount').textContent = _.get(jsData, 'properties.length', 0);
    }

    // ========== 工具函数 ==========

    // 返回顶部
    function backToTop() {
      document.getElementById('mainContent').scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 返回成员列表
    function backToMember() {
      var member = document.querySelector('[data-id="jsMember_' + currentObjName + '"]');
      if (member) { member.scrollIntoView({ behavior: 'smooth' }); }
    }

    // 复制文本到剪贴板
    function copyCode(ele) {
      var content = ele.parentNode.parentNode.parentNode.getElementsByTagName('code')[0].innerText;
      var isCopyOk = copyText(content);
      if (isCopyOk) {
        console.log('复制成功');
      } else {
        console.error('复制失败');
      }
    }

    function copyText(content) {
      var input = document.createElement('textarea');
      input.setAttribute('readonly', 'readonly');
      input.value = content;
      document.body.appendChild(input);
      input.select();
      var isCopyOk = document.execCommand('copy');
      document.body.removeChild(input);
      return isCopyOk;
    }

    // ========== 渲染包装器（调用 filldata.js 中的 FillObject） ==========
    function FillObjectWrapper(jsData) {
      previousObjName = currentObjName;
      currentObjName = jsData.name;
      FillObject(jsData);
      updateStats(jsData);
    }

    // ========== 折叠/展开控制 ==========

    // 切换单个详情条目
    function toggleDetailItem(elem) {
      if (elem.classList.contains('expanded')) {
        elem.classList.remove('expanded');
      } else {
        elem.classList.add('expanded');
        elem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // 只展开指定条目，折叠其余所有
    function expandOnly(itemId) {
      _.forEach(document.querySelectorAll('.detail-item'), function(item) {
        item.classList.remove('expanded');
      });
      var target = document.getElementById(itemId);
      if (target) {
        target.classList.add('expanded');
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // 切换全部展开/折叠
    function toggleAll() {
      var btn = document.getElementById('toggleAllBtn');
      var items = document.querySelectorAll('.detail-item');
      var allExpanded = _.every(items, function(item) {
        return item.classList.contains('expanded');
      });
      if (allExpanded) {
        _.forEach(items, function(item) { item.classList.remove('expanded'); });
        if (btn) btn.textContent = '展开全部';
      } else {
        _.forEach(items, function(item) { item.classList.add('expanded'); });
        if (btn) btn.textContent = '折叠全部';
      }
    }

    // ========== JSON 加载逻辑 ==========

    function getObjName() {
      var params = new URLSearchParams(location.search);
      return params.get('obj') || 'Application';
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      var errEl = document.getElementById('error');
      errEl.style.display = 'block';
      errEl.innerHTML = '<p><b>❌ 加载失败</b></p><p>' + msg + '</p>' +
        '<p style="margin-top:12px;">请确保已启动本地 HTTP 服务器：<br>' +
        '<code>cd /d ' + location.pathname.replace(/\/[^/]*$/, '') + ' && npx serve .</code></p>';
    }

    function loadAndRender(objName) {
      if (!objName) objName = getObjName();
      document.title = objName + ' 对象';

      document.getElementById('loading').style.display = 'block';
      document.getElementById('pageContent').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      var jsonPath = 'api_json/' + objName + '.json';

      fetch(jsonPath)
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
          return res.json();
        })
        .then(function (jsData) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('pageContent').style.display = 'block';
          document.getElementById('floatCommit').style.display = 'flex';
          FillObjectWrapper(jsData);
        })
        .catch(function (err) {
          showError('无法加载 <b>' + jsonPath + '</b>：' + err.message +
            '<br><br>可用对象示例：AddIns, Application, Range, Worksheet, Sheets, Font, Workbooks');
        });
    }

    // ========== 初始化 ==========
    function init() {
      buildNav();
      var objName = getObjName();
      currentObjName = objName;
      loadAndRender(objName);

      // 设置初始活动状态
      setTimeout(function() {
        var activeItem = document.querySelector('[data-obj="' + objName + '"]');
        if (activeItem) {
          activeItem.classList.add('active');
          activeItem.scrollIntoView({ block: 'nearest' });
        }
      }, 100);

      // 监听浏览器前进/后退
      window.addEventListener('popstate', function() {
        var name = getObjName();
        if (name !== currentObjName) {
          navigateToObject(name);
        }
      });
    }

    // 页面加载完成后执行
    window.onload = init;
  </script>

  <!-- 壁纸自适应切换 -->
  <script>
    (function() {
      var LANDSCAPE = 'img/横屏壁纸.png';
      var PORTRAIT = 'img/竖屏壁纸.jpg';
      var root = document.documentElement;

      function setWallpaper() {
        var isLandscape = window.innerWidth > window.innerHeight;
        var url = isLandscape ? LANDSCAPE : PORTRAIT;
        root.style.setProperty('--bg-wallpaper', 'url(' + url + ')');
      }

      setWallpaper();
      window.addEventListener('resize', setWallpaper);
    })();
  </script>
</body>

</html>
